<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Quick Directions</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #fff;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      padding: 14px 16px 0;
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      border-bottom: 2px solid #e8e8e8;
      flex-shrink: 0;
      padding: 0 16px;
    }

    .tab-btn {
      padding: 8px 14px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: #666;
    }

    .tab-btn.active {
      color: #1a73e8;
      border-bottom-color: #1a73e8;
    }

    /* ── Tab content ── */
    .tab-content { display: none; flex-direction: column; flex: 1; overflow: hidden; }
    .tab-content.active { display: flex; }

    /* ── Trip Builder ── */
    #stops-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px 16px;
    }

    .empty-state {
      color: #888;
      text-align: center;
      padding: 32px 16px;
      line-height: 1.6;
      font-size: 12px;
    }

    .stop-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 8px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      margin-bottom: 6px;
      background: #fff;
      cursor: grab;
      transition: border-color 0.15s, box-shadow 0.15s;
      user-select: none;
    }

    .stop-row:active { cursor: grabbing; }
    .stop-row.dragging { opacity: 0.4; }
    .stop-row.drag-over { border-color: #1a73e8; box-shadow: 0 0 0 2px #c5d8fc; }

    .drag-handle {
      color: #bbb;
      font-size: 14px;
      flex-shrink: 0;
      cursor: grab;
    }

    .stop-num {
      width: 20px;
      height: 20px;
      background: #1a73e8;
      color: #fff;
      border-radius: 50%;
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .stop-addr {
      flex: 1;
      font-size: 12px;
      line-height: 1.4;
      word-break: break-word;
    }

    .remove-stop {
      width: 22px;
      height: 22px;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 16px;
      color: #aaa;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .remove-stop:hover { background: #fee; color: #c00; }

    /* ── Add stop row ── */
    .add-stop-row {
      display: flex;
      gap: 6px;
      padding: 0 16px 10px;
      flex-shrink: 0;
    }

    .add-stop-row input {
      flex: 1;
      padding: 6px 10px;
      border: 1.5px solid #d0d0d0;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
    }

    .add-stop-row input:focus { border-color: #1a73e8; }

    .add-stop-row button {
      padding: 6px 12px;
      background: #f0f0f0;
      border: 1.5px solid #d0d0d0;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      white-space: nowrap;
    }

    .add-stop-row button:hover { background: #e4e4e4; }

    /* ── Mode selector ── */
    .mode-section {
      padding: 0 16px 10px;
      flex-shrink: 0;
    }

    .mode-label {
      font-size: 11px;
      color: #888;
      margin-bottom: 6px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .mode-group {
      display: flex;
      gap: 6px;
    }

    .mode-btn {
      flex: 1;
      padding: 6px 4px;
      border: 1.5px solid #d0d0d0;
      border-radius: 6px;
      background: #f5f5f5;
      cursor: pointer;
      font-size: 18px;
      text-align: center;
      transition: border-color 0.15s, background 0.15s;
    }

    .mode-btn:hover { border-color: #888; background: #eee; }
    .mode-btn.active { border-color: #1a73e8; background: #e8f0fe; }

    /* ── Action buttons ── */
    .actions {
      padding: 0 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex-shrink: 0;
    }

    .btn-primary {
      padding: 9px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-primary:hover { background: #1558b0; }
    .btn-primary:disabled { background: #9cb8f0; cursor: not-allowed; }

    .btn-secondary {
      padding: 8px;
      background: #f0f4ff;
      color: #1a73e8;
      border: 1.5px solid #c5d8fc;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-secondary:hover { background: #e1ecff; }
    .btn-secondary:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-ghost {
      padding: 7px;
      background: none;
      color: #888;
      border: 1.5px solid #e0e0e0;
      border-radius: 7px;
      font-size: 13px;
      cursor: pointer;
    }

    .btn-ghost:hover { background: #f5f5f5; color: #333; }

    #trip-status {
      font-size: 12px;
      color: #188038;
      text-align: center;
      min-height: 16px;
      padding: 0 0 4px;
    }

    #trip-status.warn { color: #c75000; }

    /* ── Settings tab ── */
    .settings-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 14px 16px;
    }

    .settings-section { margin-bottom: 20px; }

    .settings-label {
      font-weight: 600;
      margin-bottom: 8px;
      color: #333;
    }

    .location-row {
      display: grid;
      grid-template-columns: 76px 1fr 28px;
      gap: 5px;
      margin-bottom: 6px;
      align-items: center;
    }

    .location-row input {
      width: 100%;
      padding: 5px 8px;
      border: 1.5px solid #d0d0d0;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
    }

    .location-row input:focus { border-color: #1a73e8; }

    .remove-loc {
      width: 28px;
      height: 28px;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 16px;
      color: #aaa;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .remove-loc:hover { background: #fee; color: #c00; }

    #add-location {
      background: none;
      border: 1.5px dashed #ccc;
      border-radius: 6px;
      width: 100%;
      padding: 5px;
      cursor: pointer;
      color: #666;
      font-size: 12px;
      margin-top: 2px;
    }

    #add-location:hover { border-color: #888; color: #333; }

    .settings-footer {
      padding: 0 16px 16px;
      flex-shrink: 0;
    }

    #settings-status {
      text-align: center;
      margin-top: 8px;
      font-size: 12px;
      color: #188038;
      min-height: 16px;
    }

    /* ── Map section ── */
    #map-section {
      flex-shrink: 0;
      overflow: hidden;
      transition: height 0.25s ease;
    }

    #map-section.collapsed { height: 0 !important; }

    .map-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 16px;
      background: #f5f5f5;
      border-top: 1px solid #e8e8e8;
      border-bottom: 1px solid #e8e8e8;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      user-select: none;
      flex-shrink: 0;
    }

    .map-toggle:hover { background: #ebebeb; }
    .map-toggle .chevron { transition: transform 0.2s; font-style: normal; }
    .map-toggle.open .chevron { transform: rotate(180deg); }

    #map-frame {
      width: 100%;
      height: 220px;
      border: none;
      display: block;
    }

    #map-placeholder {
      height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #999;
      text-align: center;
      padding: 16px;
      line-height: 1.6;
    }

    /* ── Optimize progress ── */
    .progress-bar-wrap {
      height: 3px;
      background: #e8e8e8;
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 6px;
    }

    .progress-bar {
      height: 100%;
      background: #1a73e8;
      transition: width 0.3s;
      width: 0%;
    }

    /* ── API key input ── */
    .api-key-input {
      width: 100%;
      padding: 5px 8px;
      border: 1.5px solid #d0d0d0;
      border-radius: 6px;
      font-size: 12px;
      font-family: monospace;
      outline: none;
    }

    .api-key-input:focus { border-color: #1a73e8; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🗺️ Quick Directions</h1>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="trip">Trip Builder</button>
    <button class="tab-btn" data-tab="settings">Settings</button>
  </div>

  <!-- ── Trip Builder ── -->
  <div id="tab-trip" class="tab-content active">
    <div id="stops-list">
      <div class="empty-state">
        Right-click any highlighted address<br>and choose <strong>Add to trip</strong><br><br>
        or type a stop below.
      </div>
    </div>

    <div class="add-stop-row">
      <input type="text" id="add-stop-input" placeholder="Type an address or place…" />
      <button id="add-stop-btn">Add</button>
    </div>

    <!-- ── Map preview ── -->
    <button class="map-toggle open" id="map-toggle">
      <span>Map Preview</span>
      <i class="chevron">▲</i>
    </button>
    <div id="map-section">
      <div id="map-placeholder">Add stops to see<br>a route preview</div>
      <iframe id="map-frame" style="display:none" referrerpolicy="no-referrer-when-downgrade" allowfullscreen></iframe>
    </div>

    <div class="mode-section">
      <div class="mode-label">Travel mode</div>
      <div class="mode-group" id="trip-mode-group">
        <button class="mode-btn active" data-mode="driving" title="Driving">🚗</button>
        <button class="mode-btn" data-mode="transit" title="Transit">🚌</button>
        <button class="mode-btn" data-mode="cycling" title="Cycling">🚴</button>
        <button class="mode-btn" data-mode="walking" title="Walking">🚶</button>
      </div>
    </div>

    <div class="actions">
      <div class="progress-bar-wrap" id="progress-wrap" style="display:none">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <div id="trip-status"></div>
      <button class="btn-secondary" id="optimize-btn">✨ Optimize Route</button>
      <button class="btn-primary" id="launch-btn">Open in Google Maps</button>
      <button class="btn-ghost" id="clear-btn">Clear trip</button>
    </div>
  </div>

  <!-- ── Settings ── -->
  <div id="tab-settings" class="tab-content">
    <div class="settings-scroll">
      <div class="settings-section">
        <div class="settings-label">Default travel mode</div>
        <div class="mode-group" id="settings-mode-group">
          <button class="mode-btn" data-mode="driving" title="Driving">🚗</button>
          <button class="mode-btn" data-mode="transit" title="Transit">🚌</button>
          <button class="mode-btn" data-mode="cycling" title="Cycling">🚴</button>
          <button class="mode-btn" data-mode="walking" title="Walking">🚶</button>
        </div>
      </div>

      <div class="settings-section">
        <div class="settings-label">Google Maps API Key</div>
        <input type="password" class="api-key-input" id="api-key-input" placeholder="Paste your API key…" autocomplete="off" />
      </div>

      <div class="settings-section">
        <div class="settings-label">Saved locations</div>
        <div id="locations-list"></div>
        <button id="add-location">+ Add location</button>
      </div>
    </div>

    <div class="settings-footer">
      <button class="btn-primary" id="save-settings-btn">Save settings</button>
      <div id="settings-status"></div>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
